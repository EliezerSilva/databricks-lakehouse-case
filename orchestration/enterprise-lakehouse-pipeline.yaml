resources:
  jobs:
    enterprise_lakehouse_pipeline:
      name: enterprise-lakehouse-pipeline
      tasks:
        - task_key: bronze_ingestion
          notebook_task:
            notebook_path: /Workspace/databricks-lakehouse-case/notebooks/bronze/01_bronze_pedidos_cabecalho
            source: WORKSPACE
        - task_key: silver_processing
          depends_on:
            - task_key: bronze_ingestion
          notebook_task:
            notebook_path: /Workspace/databricks-lakehouse-case/notebooks/silver/02_silver_pedidos_itens
            source: WORKSPACE
        - task_key: gold_analytics
          depends_on:
            - task_key: silver_processing
          notebook_task:
            notebook_path: /Workspace/databricks-lakehouse-case/notebooks/gold/03_gold_metricas
            source: WORKSPACE
        - task_key: data_quality_validation
          depends_on:
            - task_key: gold_analytics
          notebook_task:
            notebook_path: /Workspace/databricks-lakehouse-case/notebooks/troubleshooting/99_data_quality_checks
            source: WORKSPACE
        - task_key: operational_evidence
          depends_on:
            - task_key: data_quality_validation
          notebook_task:
            notebook_path: /Workspace/databricks-lakehouse-case/notebooks/troubleshooting/90_evidencias_validacao
            source: WORKSPACE
      queue:
        enabled: true
